<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Zioraa Dashboard</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='images/logo.png') }}">

    <link rel="stylesheet"
          href="{{url_for('static', filename='css/dash.css')}}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="dashboard-layout">

    <!-- MOBILE OVERLAY -->
    <div class="overlay"
         onclick="toggleSidebar()">
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Zioraa Logo" class="sidebar-logo" width="50">
            <div>
                <h2>Zioraa</h2>
                <span>Admin Panel</span>
            </div>
        </div>
        
        <div class="nav-section">

            <p class="nav-title">
                MAIN
            </p>

            <button onclick="loadTab('/dash/dashboard')">
                <i class="fa fa-th-large"></i>
                Dashboard
            </button>

            <button onclick="loadTab('/dash/admin')">
                <i class="fa fa-user-secret"></i>
                Admins
            </button>

            <button onclick="loadTab('/dash/ord-request')">
                <i class="fa fa-shopping-cart"></i>
                Order Requests
            </button>

            <button onclick="loadTab('/dash/messages')">
                <i class="fa fa-envelope"></i>
                Messages
            </button>

            <button onclick="loadTab('/dash/password')">
                <i class="fa fa-envelope"></i>
                Password Requests
            </button>

        </div>


        <div class="nav-section">

            <p class="nav-title">
                MANAGEMENT
            </p>

            <button onclick="loadTab('/dash/ord-find')">
                <i class="fa fa-search"></i>
                Find Order
            </button>

            <button onclick="loadTab('/dash/prod-top')">
                <i class="fa fa-line-chart"></i>
                Top Selling
            </button>

            <button onclick="loadTab('/dash/prod-critic')">
                <i class="fa fa-warning"></i>
                Critical Products
            </button>

            <button onclick="loadTab('/dash/products')">
                <i class="fa fa-cube"></i>
                Products
            </button>

            <button onclick="loadTab('/dash/users')">
                <i class="fa fa-users"></i>
                Users
            </button>

        </div>

    </aside>


    <!-- MAIN -->
    <main class="main-content">

        <!-- TOPBAR -->
        <div class="topbar">

            <div class="topbar-left">

                <div class="menu-btn"
                     onclick="toggleSidebar()">
                    ☰
                </div>

                <div>

                    <h1>
                        Dashboard
                    </h1>

                    <p>
                        Welcome back to Zioraa Admin Panel
                    </p>

                </div>

            </div>


            <div class="topbar-right">

                <a class="home-btn" href="/">
                    <i class="fa fa-home"></i>
                </a>

            </div>

        </div>


        <!-- CONTENT -->
        <div id="content-area">

            <div class="loading">

                Loading Dashboard...

            </div>

        </div>

    </main>

</div>

<script src="{{url_for('static', filename='js/dash.js')}}"></script>

<script>

    loadTab('/dash/dashboard')

</script>

</body>
</html>
