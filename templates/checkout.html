<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <title>Zioraa Checkout</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/checkout.css') }}">

    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='images/logo.png') }}">
</head>

<body>

<div class="box">

    <h2>Checkout</h2>

    <form id="checkoutForm" method="POST" action="/process">

        <!-- USER DETAILS -->
        {% for pid in request.args.getlist('pid') %}
        <input type="hidden" name="pid" value="{{ pid }}">
        {% endfor %}
        <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter Name"
            value="{{ data.username if data.username != None else '' }}"
        >

        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter Email"
            value="{{ data.mail if data.mail != None else '' }}"
        >

        <input
            type="text"
            id="phone"
            name="phone"
            placeholder="Enter Phone Number"
            value="{{ data.phone if data.phone != None else '' }}"
        >

        <textarea
            id="address"
            name="address"
            placeholder="Enter Address"
        >{{ data.address if data.address != None else '' }}</textarea>


        <!-- PRODUCTS -->

        <div class="products">

            <table>

                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                    </tr>
                </thead>

                <tbody>

                    {% for product in data.products %}

                    <tr>
                        <td>{{ product.name }}</td>
                        <td>₹{{ product.price }}</td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>


        <!-- TOTAL -->

        <div class="total">
            Pay ₹{{ total }} and Click Proceed
        </div>

        <!-- BUTTON -->

        <button
            type="button"
            onclick="payNow(); this.disabled=true;"
            class="btn">
            Proceed
        </button>

    </form>

</div>
<script>
let isPaying = false;

async function payNow() {

    if (isPaying) return;
    isPaying = true;

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();

    if (name === "" || name.toLowerCase() === "none") {
        alert("Please enter your name");
        isPaying = false;
        return;
    }

    if (email === "" || email.toLowerCase() === "none") {
        alert("Please enter your email");
        isPaying = false;
        return;
    }

    if (phone === "" || phone.length < 10) {
        alert("Please enter valid phone number");
        isPaying = false;
        return;
    }

    if (address === "" || address.toLowerCase() === "none") {
        alert("Please enter your address");
        isPaying = false;
        return;
    }

    document.getElementById("checkoutForm").submit();
}
</script>

</body>
</html>
