<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zioraa Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/checkout.css') }}">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
</head>
<body>
<div class="box">
  <h2>Checkout</h2>
  <form method="POST">
    <input name="name" placeholder="Name" value="{{ data.user[0] }}" required>
    <input name="phone" placeholder="Phone" value="{{ data.user[1] }}" required>
    <textarea name="address" placeholder="Address" required>{{ data.user[2] }}</textarea>

    <div class="products">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody>
          {% for product in data.product %}
          <tr>
            <td>{{ product[0] }}</td>
            <td>₹{{ product[1] }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <input type="hidden" name="amount" value="{{ total }}">

    <!-- <div class="payment">
      <label class="pay-option">
        <input type="radio" name="pay" value="online" checked>
        <span>Pay Online</span>
      </label>

      <label class="pay-option">
        <input type="radio" name="pay" value="cod">
        <span>Cash on Delivery</span>
      </label>
    </div> -->

    <div class="total">Total: ₹{{ total }}</div>

    <button type="button" class="btn" onclick="pay(event)">Place Order</button>
  </form>
</div>

<script>
function pay(e){
  e.preventDefault();
  const payMode = "online";
  const form = document.querySelector("form");
  form.action = "/payment/create";
  form.submit();
}
</script>

</body>
</html>
