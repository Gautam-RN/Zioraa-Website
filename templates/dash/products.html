<div class="section-wrapper">
    <!-- HEADER -->
    <div class="section-header">
        <div class="section-title">
            <h2>Product Management</h2>
            <p>Search, manage and create products from one place</p>
        </div>
    </div>

    <!-- SEARCH PRODUCT -->
    <div class="content-block">

        <div class="block-header">
            <h3>Find Product</h3>
        </div>

        <!-- SEARCH -->
        <form action="{{ url_for('dash.search_prod') }}"
            class="ajax-form search-form"
            method="POST">

            <input type="number"
                id="pid"
                name="pid"
                placeholder="Enter Product ID..."
                required>

            <button type="submit">
                <i class="fa fa-search"></i>
                Search Product
            </button>

        </form>


        {% if prod %}

        <!-- PRODUCT CARD -->
        <div class="product-editor">

            <form action="{{ url_for('dash.update_prod') }}"
                method="POST"
                class="ajax-form">

                <input type="hidden"
                    name="pid"
                    value="{{ prod.pid }}">

                <!-- TOP -->
                <div class="editor-top">

                    <div>
                        <label>PID</label>
                        <div class="pid-box">
                            #{{ prod.pid }}
                        </div>
                    </div>

                    <div class="editor-actions">
                        <button type="submit" class="save-btn">
                            Update Product
                        </button>
                    </div>

                </div>


                <!-- GRID -->
                <div class="editor-grid">

                    <div class="field">
                        <label>Product Name</label>
                        <input type="text"
                            name="name"
                            value="{{ prod.name }}">
                    </div>

                    <div class="field">
                        <label>Category</label>
                        <input type="text"
                            name="catgy"
                            value="{{ prod.catgy }}">
                    </div>

                    <div class="field">
                        <label>Collection</label>
                        <input type="text"
                            name="collection"
                            value="{{ prod.collection }}">
                    </div>

                    <div class="field">
                        <label>Colour</label>
                        <input type="text"
                            name="colour"
                            value="{{ prod.colour }}">
                    </div>

                    <div class="field">
                        <label>Supplier</label>
                        <input type="text"
                            name="supplier"
                            value="{{ prod.supplier }}">
                    </div>

                    <div class="field">
                        <label>Stock</label>
                        <input type="number"
                            name="stock"
                            value="{{ prod.stock }}">
                    </div>

                    <div class="field">
                        <label>Price</label>
                        <input type="number"
                            name="price"
                            value="{{ prod.price }}">
                    </div>

                    <div class="field">
                        <label>Offer %</label>
                        <input type="number"
                            name="offer"
                            value="{{ prod.offer }}">
                    </div>

                    <div class="field">
                        <label>Sold</label>
                        <input type="number"
                            name="sold"
                            value="{{ prod.sold }}">
                    </div>

                </div>


                <!-- DESCRIPTION -->
                <div class="field description-field">

                    <label>Description</label>

                    <textarea name="desc">{{ prod.desc }}</textarea>

                </div>

            </form>


            <!-- DELETE -->
            <form action="{{ url_for('dash.delete_prod') }}"
                method="POST"
                class="ajax-form delete-form">

                <input type="hidden"
                    name="pid"
                    value="{{ prod.pid }}">

                <button type="submit"
                        class="delete-btn">

                    Delete Product

                </button>

            </form>

        </div>

        {% endif %}

    </div>

    <!-- ADD PRODUCT -->
    <div class="content-block">

        <div class="block-header">
            <h3>Add New Product</h3>
        </div>

        <form action="/add-product"
            method="POST"
            class="ajax-form product-form">

            <!-- PRODUCT NAME -->
            <div class="form-group">
                <label>Product Name</label>
                <input type="text"
                    name="name"
                    placeholder="Enter product name"
                    required>
            </div>

            <!-- DESCRIPTION -->
            <div class="form-group">
                <label>Description</label>
                <textarea name="desc"
                        placeholder="Enter product description"
                        required></textarea>
            </div>

            <!-- GRID INPUTS -->
            <div class="form-grid">

                <div class="form-group">
                    <label>Stock</label>
                    <input type="number"
                        name="stock"
                        placeholder="0"
                        min="0"
                        required>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number"
                        name="price"
                        placeholder="0"
                        min="1"
                        required>
                </div>

                <div class="form-group">
                    <label>Offer %</label>
                    <input type="number"
                        name="offer"
                        placeholder="0"
                        min="0"
                        max="100">
                </div>

                <div class="form-group">
                    <label>Sold</label>
                    <input type="number"
                        name="sold"
                        placeholder="0"
                        min="0"
                        value="0">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text"
                        name="catgy"
                        placeholder="T-Shirts"
                        required>
                </div>

                <div class="form-group">
                    <label>Collection</label>
                    <input type="text"
                        name="collection"
                        placeholder="Collection">
                </div>

                <div class="form-group">
                    <label>Colour</label>
                    <input type="text"
                        name="colour"
                        placeholder="Colour">
                </div>

                <div class="form-group">
                    <label>Supplier</label>
                    <input type="text"
                        name="supplier"
                        placeholder="Supplier name" 
                        value="In-House"
                        required>
                </div>

            </div>

            <button type="submit" class="submit-btn">
                <i class="fa fa-plus"></i>
                Add Product
            </button>

        </form>

    </div>
</div>
